# Database (uses environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/placement_tracking}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:DefaultSecretKey_ChangeInProduction_MustBe256BitsOrMore}
jwt.expiration=86400000

# CORS (update with your frontend URL after deployment)
allowed.origins=${ALLOWED_ORIGINS:*}