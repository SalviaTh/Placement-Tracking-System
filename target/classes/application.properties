# PostgreSQL Database (uses environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/placement_tracking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:DefaultSecretKey_ChangeInProduction_MustBe256BitsOrMore}
jwt.expiration=86400000